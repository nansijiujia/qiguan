# ============================================================
# Nginx配置 - 绮管电商后台系统（域名权限严格分离版）
# 服务器: 111.229.132.151
# SSL证书: /etc/nginx/ssl/qimengzhiyue.cn_*
# 更新时间: 2026-04-17
# 
# 域名分配规则：
#   【后台系统专用】
#     - www.qimengzhiyue.cn (主要) - 后台管理系统
#     - admin.qimengzhiyue.cn (备用) - 后台管理系统
#   
#   【小程序专用】(已添加至微信小程序白名单)
#     - qimengzhiyue.cn - 小程序业务域名/官网
#     - api.qimengzhiyue.cn - 小程序API接口域名
#
# 访问控制：
#   ✅ 后台域名 → 仅可访问管理后台前端 + 管理类API
#   ✅ 小程序域名 → 仅可访问小程序API + 业务页面
#   ❌ 禁止跨域访问（后台域名不能调小程序API，反之亦然）
# ============================================================

upstream backend_api { 
    server 127.0.0.1:3003; 
    keepalive 32; 
}

gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

# ============================================================
# HTTP -> HTTPS 重定向 (所有域名统一跳转HTTPS)
# ============================================================
server { 
    listen 80; 
    server_name qimengzhiyue.cn www.qimengzhiyue.cn admin.qimengzhiyue.cn api.qimengzhiyue.cn; 
    return 301 https://$host$request_uri; 
}

# ============================================================
# 【后台系统-主要域名】https://www.qimengzhiyue.cn
# 用途：后台管理系统（管理员使用）
# 服务内容：管理后台前端 + 管理类API接口
# 访问限制：仅允许管理员IP访问（可选）
# ============================================================
server {
    listen 443 ssl http2;
    server_name www.qimengzhiyue.cn;
    
    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # 安全头配置
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # 标识此为后台系统域名
    add_header X-Service-Type "admin-backend" always;
    
    # 指向后台管理系统前端
    root /var/www/qiguan/admin-frontend/dist; 
    index index.html;
    
    include mime.types;
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # 前端路由（SPA）
    location / { 
        try_files $uri $uri/ /index.html; 
    }
    
    # 管理后台API代理（添加来源标识）
    location /api/ { 
        # 验证请求来源为后台系统
        proxy_pass http://backend_api; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 关键：标识此请求来自后台管理系统
        proxy_set_header X-Client-Type "admin-panel";
        proxy_set_header X-Original-Host "www.qimengzhiyue.cn";
        
        client_max_body_size 50m; 
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;
    }
    
    # 上传文件目录（COS挂载）
    location /uploads {
        alias /var/www/qiguan/uploads;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # 禁止访问隐藏文件和敏感路径
    location ~ /\. { 
        deny all; 
    }
    
    # 明确禁止访问小程序专属路径（如果有）
    location ~* ^/(miniapp|wxapp|wechat)/ {
        return 403 '{"error":"Forbidden","message":"后台域名不允许访问小程序专属接口"}';
        default_type application/json;
    }
}

# ============================================================
# 【后台系统-备用域名】https://admin.qimengzhiyue.cn
# 用途：后台管理系统备用入口（主要域名故障时使用）
# 服务内容：与主要域名完全相同
# 注意：仅在www域名不可用时启用
# ============================================================
server {
    listen 443 ssl http2;
    server_name admin.qimengzhiyue.cn;
    
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # 安全头
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Service-Type "admin-backend-backup" always;
    
    # 同样指向后台管理系统前端
    root /var/www/qiguan/admin-frontend/dist; 
    index index.html;
    
    include mime.types;
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    location / { 
        try_files $uri $uri/ /index.html; 
    }
    
    location /api/ { 
        proxy_pass http://backend_api; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Client-Type "admin-panel";
        proxy_set_header X-Original-Host "admin.qimengzhiyue.cn";
        
        client_max_body_size 50m; 
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;
    }
    
    location /uploads {
        alias /var/www/qiguan/uploads;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    location ~ /\. { 
        deny all; 
    }
    
    # 禁止访问小程序专属路径
    location ~* ^/(miniapp|wxapp|wechat)/ {
        return 403 '{"error":"Forbidden","message":"后台域名不允许访问小程序专属接口"}';
        default_type application/json;
    }
}

# ============================================================
# 【小程序主域名】https://qimengzhiyue.cn
# 用途：小程序业务域名 / 官网（已添加至微信小程序白名单）
# 服务内容：小程序H5页面 / 业务展示页
# 访问限制：公开访问（用于小程序webview或用户浏览器）
# ⚠️ 重要：禁止作为后台管理系统入口！
# ============================================================
server {
    listen 443 ssl http2;
    server_name qimengzhiyue.cn;
    
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # 安全头（小程序场景优化）
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "DENY" always;  # 禁止iframe嵌入
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # 标识此为小程序域名
    add_header X-Service-Type "miniapp-public" always;
    
    # ⚠️ 不指向管理后台！指向小程序前端或业务页面
    # 如果没有独立的小程序前端，可以返回提示页或403
    root /var/www/qiguan/admin-frontend/dist;  # 临时使用同一目录（后续可替换为小程序专有前端）
    index index.html;
    
    include mime.types;
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # 前端路由
    location / { 
        try_files $uri $uri/ /index.html; 
    }
    
    # 小程序API代理（添加来源标识）
    location /api/ { 
        proxy_pass http://backend_api; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 关键：标识此请求来自小程序
        proxy_set_header X-Client-Type "miniapp-client";
        proxy_set_header X-Original-Host "qimengzhiyue.cn";
        proxy_cache_bypass $http_upgrade;
        
        client_max_body_size 50m;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
    
    # 上传文件（公开读取）
    location /uploads {
        alias /var/www/qiguan/uploads;
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin *;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. { 
        deny all; 
    }
    
    # 明确禁止访问后台管理专属路径（如需更严格的隔离）
    # location ~* ^/(admin|manage|dashboard|system)/ {
    #     return 403;
    # }
}

# ============================================================
# 【小程序API域名】https://api.qimengzhiyue.cn
# 用途：小程序专用API接口（已添加至微信小程序白名单）
# 服务内容：纯数据接口服务（无前端页面）
# 访问限制：仅允许小程序发起的跨域请求
# ⚠️ 重要：禁止直接在浏览器中访问作为后台管理入口！
# ============================================================
server {
    listen 443 ssl http2;
    server_name api.qimengzhiyue.cn;
    
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # 安全头（API专用）
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "DENY" always;  # 禁止iframe嵌入
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Service-Type "miniapp-api-only" always;
    
    # 所有请求都代理到后端API
    location / {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 标识来自小程序API域名
        proxy_set_header X-Client-Type "miniapp-api";
        proxy_set_header X-Original-Host "api.qimengzhiyue.cn";
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }
    
    # 上传文件接口（CORS支持小程序跨域）
    location /uploads {
        alias /var/www/qiguan/uploads;
        expires 7d;
        add_header Cache-Control "public";
        # 允许小程序域名跨域访问
        add_header Access-Control-Allow-Origin "https://qimengzhiyue.cn";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization";
        
        # 处理OPTIONS预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://qimengzhiyue.cn";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }
}