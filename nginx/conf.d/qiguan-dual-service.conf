# ============================================================
# 绮管电商 - 共用服务器 Nginx 配置
# 文件位置: /etc/nginx/conf.d/qiguan.conf
# 
# 架构说明:
#   主域名 qimengzhiyue.cn -> 小程序后端 API
#   子域名 admin.qimengzhiyue.cn -> 后台管理系统
#   两个服务共用同一台云服务器 (2核2G)
# ============================================================

# ==================== 全局参数 ====================
# 上游服务器定义
upstream backend_api {
    server 127.0.0.1:3000;
    keepalive 32;  # 保持连接池，减少TCP握手开销
}

# ==================== HTTP -> HTTPS 强制跳转 ====================
server {
    listen 80;
    server_name qimengzhiyue.cn admin.qimengzhiyue.cn www.qimengzhiyue.cn;
    
    # Let's Encrypt 验证路径（申请证书时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    return 301 https://$host$request_uri;
}

# ==================== 主域名: 小程序 API 服务 ====================
server {
    listen 443 ssl http2;
    server_name qimengzhiyue.cn www.qimengzhiyue.cn;

    # SSL 证书配置（使用你已有的证书）
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;

    # SSL 安全优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # 访问日志
    access_log /var/log/nginx/qimengzhiyue_access.log main;
    error_log /var/log/nginx/qimengzhiyue_error.log warn;

    # API 反向代理 -> Node.js 后端 (端口3000)
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        
        # WebSocket 支持（实时通知、订单状态推送等）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 性能优化
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置（适合电商场景的长时间操作）
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # 缓冲区设置（处理大请求体，如商品图片上传）
        client_max_body_size 50m;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # 健康检查端点（负载均衡和监控使用）
    location /health {
        proxy_pass http://backend_api;
        access_log off;
    }
    
    # Swagger API文档（开发调试用，生产环境可注释掉）
    location /api-docs {
        proxy_pass http://backend_api;
        # 生产环境建议限制IP访问
        # allow 你的IP地址;
        # deny all;
    }

    # 禁止访问隐藏文件和敏感目录
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ==================== 子域名: 后台管理系统 ====================
server {
    listen 443 ssl http2;
    server_name admin.qimengzhiyue.cn;

    # SSL 证书（使用通配符证书或单独申请子域名证书）
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;

    # SSL 安全配置（同上）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # 访问日志
    access_log /var/log/nginx/admin_access.log main;
    error_log /var/log/nginx/admin_error.log warn;

    # 前端静态文件根目录
    root /var/www/admin/dist;
    index index.html;

    # Vue SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理 -> 同一个 Node.js 后端 (端口3000)
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    # 静态资源缓存策略（前端构建产物）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
