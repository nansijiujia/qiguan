# ==================== API子域名: 小程序专用API服务 ====================
# 域名: api.qimengzhiyue.cn
# 用途: 微信小程序后端API接口
# 端口: 443 (HTTPS)

# HTTP -> HTTPS 强制跳转
server {
    listen 80;
    server_name api.qimengzhiyue.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

# HTTPS API服务
server {
    listen 443 ssl http2;
    server_name api.qimengzhiyue.cn;

    # SSL证书配置（首次使用自签名或待certbot签发）
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;

    # SSL安全优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # 访问日志
    access_log /var/log/nginx/api_access.log main;
    error_log /var/log/nginx/api_error.log warn;

    # API 反向代理 -> Node.js 后端 (端口3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # 健康检查端点（无需日志）
    location /health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # 禁止访问隐藏文件和敏感目录
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
