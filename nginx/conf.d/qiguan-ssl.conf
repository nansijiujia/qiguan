upstream backend_api { server 127.0.0.1:3003; keepalive 32; }
gzip on; gzip_vary on; gzip_comp_level 6;

# HTTP -> HTTPS 重定向
server { 
    listen 80; 
    server_name qimengzhiyue.cn www.qimengzhiyue.cn admin.qimengzhiyue.cn api.qimengzhiyue.cn; 
    return 301 https://$host$request_uri; 
}

# 主域名和WWW域名 - 后台管理系统
server {
    listen 443 ssl http2;
    server_name qimengzhiyue.cn www.qimengzhiyue.cn;        
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    
    root /var/www/qiguan/admin-frontend/dist; 
    index index.html;
    
    # MIME类型显式声明
    include mime.types;
    types {
        application/javascript js mjs;
        text/css css;
        application/json json;
        image/png png;
        image/jpeg jpg jpeg;
        image/svg+xml svg;
        font/woff woff;
        font/woff2 woff2;
        font/ttf ttf;
        font/eot eot;
    }
    
    # 静态资源缓存和MIME处理
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        
        try_files $uri =404;
    }
    
    location / { 
        try_files $uri $uri/ /index.html; 
    }
    
    location /api/ { 
        proxy_pass http://backend_api; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m; 
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;
    }
    
    location ~ /\. { deny all; }
}

# API子域名 - 小程序接口
server {
    listen 443 ssl http2;
    server_name api.qimengzhiyue.cn;
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    
    location / {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }
}

