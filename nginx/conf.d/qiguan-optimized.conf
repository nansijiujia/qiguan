# ============================================================
# 绮管电商 - 共用服务器 Nginx 配置 (优化版)
# 文件位置: /etc/nginx/conf.d/qiguan.conf
#
# 架构说明:
#   主域名 qimengzhiyue.cn -> 小程序后端 API
#   子域名 admin.qimengzhiyue.cn -> 后台管理系统
#   两个服务共用同一台云服务器 (2核2G)
#
# 优化内容:
#   1. Gzip压缩 - 显著减少传输体积
#   2. 静态资源长期缓存 - 利用浏览器缓存提升加载速度
#   3. 安全头增强 - 提升安全性
# ============================================================

# ==================== 全局参数 ====================
# 上游服务器定义
upstream backend_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ==================== Gzip 压缩配置 ====================
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    application/woff
    application/woff2
    font/woff
    font/woff2;

# ==================== HTTP -> HTTPS 强制跳转 ====================
server {
    listen 80;
    server_name qimengzhiyue.cn admin.qimengzhiyue.cn www.qimengzhiyue.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

# ==================== 主域名: 小程序 API 服务 ====================
server {
    listen 443 ssl http2;
    server_name qimengzhiyue.cn www.qimengzhiyue.cn;

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;

    # SSL 安全优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # 访问日志
    access_log /var/log/nginx/qimengzhiyue_access.log main;
    error_log /var/log/nginx/qimengzhiyue_error.log warn;

    # API 反向代理 -> Node.js 后端 (端口3000)
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://backend_api;
        access_log off;
    }

    # Swagger API文档
    location /api-docs {
        proxy_pass http://backend_api;
    }

    # 后台管理系统 (主域名路径)
    location /admin {
        alias /var/www/admin/dist;
        try_files $uri $uri/ /index.html;
    }

    # 后台API代理 (主域名路径)
    location /admin/api/ {
        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    # 禁止访问隐藏文件和敏感目录
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ==================== 子域名: 后台管理系统 (优化版) ====================
server {
    listen 443 ssl http2;
    server_name admin.qimengzhiyue.cn;

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/qimengzhiyue.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qimengzhiyue.cn.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # 访问日志
    access_log /var/log/nginx/admin_access.log main;
    error_log /var/log/nginx/admin_error.log warn;

    # 前端静态文件根目录
    root /var/www/admin/dist;
    index index.html;

    # Vue SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理 -> Node.js 后端 (端口3000)
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    # ==================== 静态资源优化缓存策略 ====================
    # 对于带hash的构建产物，使用长期缓存（1年）
    # 这些文件名包含hash值，内容变化时文件名也会变
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 图片和字体资源缓存（1年）
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML和其他文档不缓存或短期缓存（确保更新及时）
    location ~* \.(html|htm|json|xml)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
