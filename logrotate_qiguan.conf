/var/log/qiguan/*.log {
    # 轮转周期：每天
    daily

    # 缺失文件不报错
    missingok

    # 保留14个备份文件（即保留14天日志）
    rotate 14

    # 压缩旧日志（节省磁盘空间）
    compress

    # 延迟压缩（下次轮转时才压缩上次的旧日志，避免刚轮转就压缩导致问题）
    delaycompress

    # 空文件不轮转
    notifempty

    # 新建日志文件的权限和所有者
    create 0644 www-data www-data

    # 所有匹配的文件共享同一个脚本（只执行一次postrotate）
    sharedscripts

    # 轮转后的操作：通知PM2重新打开日志文件
    postrotate
        pm2 reloadLogs > /dev/null 2>&1 || true
    endscript
}

# ============================================================
# 安装说明：
#
# 1. 复制此文件到系统logrotate目录：
#    sudo cp logrotate_qiguan.conf /etc/logrotate.d/qiguan
#
# 2. 测试配置是否正确（dry-run模式）：
#    sudo logrotate -d /etc/logrotate.d/qiguan
#
# 3. 手动执行一次轮转测试：
#    sudo logrotate -f /etc/logrotate.d/qiguan
#
# 4. 确保logrotate服务开机自启（通常默认已启用）：
#    systemctl is-enabled logrotate || systemctl enable logrotate
#
# 5. 验证定时任务已注册：
#    cat /etc/cron.daily/logrotate
#    # 应该包含: /usr/sbin/logrotate /etc/logrotate.conf
#
# ============================================================
#
# 配置说明：
#
# - daily: 每天轮转一次（通常在凌晨执行）
# - rotate 14: 保留最近14天的日志
# - compress + delaycompress:
#   - .log.1 是昨天的日志（未压缩）
#   - .log.2.gz 到 .log.14.gz 是更早的日志（已压缩）
# - pm2 reloadLogs: 通知PM2关闭旧日志文件句柄，打开新文件
#   （否则PM2会继续写入已被重命名的旧文件）
#
# 磁盘空间估算：
# - 假设每天日志约 50MB（含错误日志）
# - 未压缩日志: 50MB × 1天 = 50MB (.log.1)
# - 压缩日志: 50MB × 13天 × 30%(压缩率) ≈ 195MB (.log.2.gz ~ .log.14.gz)
# - 总计: 约 245MB / 14天
#
# 如果需要调整保留天数，修改 rotate 数值即可。
# 建议生产环境至少保留7-14天，便于排查历史问题。
#
# ============================================================
