<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>绮管后台管理系统</title>
    
    <meta name="description" content="绮管电商后台管理系统 - 高效的电商运营管理平台" />
    <meta name="theme-color" content="#409EFF" />
    
    <link rel="dns-prefetch" href="//www.qimengzhiyue.cn" />
    <link rel="preconnect" href="//www.qimengzhiyue.cn" crossorigin />
    <link rel="dns-prefetch" href="//api.qimengzhiyue.cn" />
    <link rel="preconnect" href="//api.qimengzhiyue.cn" crossorigin />
    
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #app {
        min-height: 100vh;
      }
      
      .app-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f5f7fa;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e4e7ed;
        border-top: 3px solid #409EFF;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-loading">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
